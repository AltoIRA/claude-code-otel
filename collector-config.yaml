receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  filelog/warp:
    include:
      - /var/log/warp/warp-usage-events.ndjson
    start_at: beginning
    include_file_path: true
    operators:
      - type: json_parser

processors:
  # Add resource attributes for better analysis
  resource:
    attributes:
      - key: environment
        value: "production"
        action: upsert
  resource/warp:
    attributes:
      - key: service.name
        value: "warp"
        action: upsert

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"

  debug:
    verbosity: normal

  otlphttp:
    endpoint: http://loki:3100/otlp

  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

service:
  pipelines:
    metrics: 
      receivers: [otlp]
      processors: [resource]
      exporters: [prometheus, debug]
    
    logs:
      receivers: [otlp]
      processors: [resource]
      exporters: [debug, otlphttp]

    logs/warp:
      receivers: [filelog/warp]
      processors: [resource, resource/warp]
      exporters: [debug, otlphttp]

    traces:
      receivers: [otlp]
      processors: [resource]
      exporters: [otlp/tempo, debug]
